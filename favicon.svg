<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#05050f"/>
  <!-- grid -->
  <line x1="0" y1="8" x2="32" y2="8" stroke="rgba(0,218,208,0.18)" stroke-width="0.5"/>
  <line x1="0" y1="16" x2="32" y2="16" stroke="rgba(0,218,208,0.18)" stroke-width="0.5"/>
  <line x1="0" y1="24" x2="32" y2="24" stroke="rgba(0,218,208,0.18)" stroke-width="0.5"/>
  <line x1="8" y1="0" x2="8" y2="32" stroke="rgba(0,218,208,0.18)" stroke-width="0.5"/>
  <line x1="16" y1="0" x2="16" y2="32" stroke="rgba(0,218,208,0.18)" stroke-width="0.5"/>
  <line x1="24" y1="0" x2="24" y2="32" stroke="rgba(0,218,208,0.18)" stroke-width="0.5"/>
  <!-- corner brackets -->
  <polyline points="2,6 2,2 6,2" fill="none" stroke="#00DAD0" stroke-width="1.5" stroke-linecap="square"/>
  <polyline points="26,2 30,2 30,6" fill="none" stroke="#00DAD0" stroke-width="1.5" stroke-linecap="square"/>
  <polyline points="2,26 2,30 6,30" fill="none" stroke="#00DAD0" stroke-width="1.5" stroke-linecap="square"/>
  <polyline points="26,30 30,30 30,26" fill="none" stroke="#00DAD0" stroke-width="1.5" stroke-linecap="square"/>
  <!-- V -->
  <text x="16" y="23" text-anchor="middle" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="19" fill="#00DAD0">V</text>
  <!-- pink accent -->
  <rect x="24" y="3" width="3" height="3" fill="#ff2d78"/>
</svg>
